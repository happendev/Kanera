  <meta name="msapplication-config" content="/assets/favicon/browserconfig.xml" />
  <meta name="theme-color" content="#0b111b" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#eef2f7" media="(prefers-color-scheme: light)" />

  <!-- Set the theme before first paint so the app never flashes the wrong theme and the OS
       preference is honored on first load (Angular boots after parse, too late to avoid the
       flash). Mirrors ThemeService.getInitial(); the 'kanera-theme' key is STORAGE_KEYS.THEME,
       kept in sync intentionally. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('kanera-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <k-root></k-root>
</body>
