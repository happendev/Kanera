<div class="auth-root">
  <div class="auth-card">
    <div class="auth-header">
      <k-logo [height]="34" />
      <p>Choose a new password</p>
    </div>
    <form (submit)="submit($event)">
      <div class="field">
        <label for="password"><i class="ti ti-lock"></i> New password</label>
        <div class="input-wrap">
          <input id="password" name="password" [type]="showPassword() ? 'text' : 'password'" [value]="password()" (input)="password.set($any($event.target).value)" required minlength="8" maxlength="200" autocomplete="new-password" />
          <button type="button" class="reveal-btn" tabindex="-1" (click)="showPassword.set(!showPassword())" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
            <i [class]="showPassword() ? 'ti ti-eye-off' : 'ti ti-eye'"></i>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="confirm"><i class="ti ti-lock-check"></i> Confirm password</label>
        <div class="input-wrap">
          <input id="confirm" name="confirm" [type]="showConfirm() ? 'text' : 'password'" [value]="confirm()" (input)="confirm.set($any($event.target).value)" required minlength="8" maxlength="200" autocomplete="new-password" />
          <button type="button" class="reveal-btn" tabindex="-1" (click)="showConfirm.set(!showConfirm())" [attr.aria-label]="showConfirm() ? 'Hide password' : 'Show password'">
            <i [class]="showConfirm() ? 'ti ti-eye-off' : 'ti ti-eye'"></i>
          </button>
        </div>
      </div>
      @if (error()) {
        <div class="error-banner"><i class="ti ti-alert-circle"></i> {{ error() }}</div>
      }
      @if (success()) {
        <div class="success-banner"><i class="ti ti-circle-check"></i> Password reset. Sending you back to login.</div>
      }
      <button type="submit" [disabled]="busy()" class="submit-btn">Reset password</button>
    </form>
    <div class="auth-footer"><a routerLink="/login">Back to login</a></div>
  </div>
</div>
