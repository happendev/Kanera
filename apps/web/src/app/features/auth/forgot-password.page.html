<div class="auth-root">
  <div class="auth-card">
    <div class="auth-header">
      <k-logo [height]="34" />
      <p>Reset your password</p>
    </div>
    <form (submit)="submit($event)">
      <div class="field">
        <label for="email"><i class="ti ti-mail"></i> Email</label>
        <input id="email" name="email" type="email" [value]="email()" (input)="email.set($any($event.target).value)" required maxlength="254" autocomplete="email" />
      </div>
      @if (turnstileSiteKey()) {
        <div class="turnstile-field">
          <div #turnstileContainer></div>
        </div>
      }
      @if (sent()) {
        <div class="success-banner"><i class="ti ti-circle-check"></i> If that email exists, a reset link has been created.</div>
      }
      @if (error()) {
        <div class="error-banner"><i class="ti ti-alert-circle"></i> {{ error() }}</div>
      }
      <button type="submit" [disabled]="busy()" class="submit-btn">Send reset link</button>
    </form>
    <div class="auth-footer"><a routerLink="/login">Back to login</a></div>
  </div>
</div>
