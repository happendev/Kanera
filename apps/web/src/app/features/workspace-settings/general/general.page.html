<div class="board-form">
        <div style="display:flex;align-items:center;gap:8px">
          <k-icon-picker [value]="settings.icon()" (valueChange)="settings.updateWorkspaceIcon($event)" />
          <k-color-picker [value]="settings.accentColor()" (valueChange)="settings.updateWorkspaceAccentColor($event)" />
          <input name="name" [placeholder]="settings.entityLabelTitle() + ' name'" [value]="settings.name()" (input)="settings.updateWorkspaceName($any($event.target).value)" (blur)="settings.saveWorkspaceNameNow()" (keydown.enter)="settings.saveWorkspaceNameNow(); $event.preventDefault()" required
            style="flex:1" />
        </div>
      </div>
      <div class="board-settings-section">
        <div class="guest-section-head">
          <i class="ti ti-circle-check"></i>
          <span>Completed cards</span>
        </div>
        <div class="board-form single-line-capture">
          <label class="compact-number-field">
            <span>Show completed cards on boards for</span>
            <input type="number" min="0" max="365" step="1" [value]="settings.workspace()?.completedCardsActiveDays ?? settings.completedCardsActiveDaysDefault" (input)="settings.updateCompletedCardsActiveDays($any($event.target).value)" />
            <span>days</span>
          </label>
        </div>
      </div>
      @if (settings.canManageApi()) {
      <div class="danger-zone">
        <div class="danger-zone-head">
          <span class="danger-label">Danger zone</span>
        </div>
        <div class="danger-action-row">
          <i class="ti ti-trash danger-action-icon"></i>
          <div class="danger-action-copy">
            <span class="danger-action-title">Delete this {{ settings.entityLabel() }}</span>
            <span class="danger-action-desc">
              @if (settings.isStandalone()) {
              Permanently removes this board, its cards, and settings.
              } @else {
              Permanently removes this workspace, its boards, cards, and settings.
              }
            </span>
          </div>
          <button class="ghost sm danger-action-button" (click)="settings.deleteWorkspace()">Delete</button>
        </div>
      </div>
}
