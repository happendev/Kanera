<div class="board-form">
        <div style="display:flex;align-items:center;gap:8px">
          <k-icon-picker [value]="settings.icon()" (valueChange)="settings.updateWorkspaceIcon($event)" />
          <k-color-picker [value]="settings.accentColor()" (valueChange)="settings.updateWorkspaceAccentColor($event)" />
          <input name="name" placeholder="Workspace name" [value]="settings.name()" (input)="settings.updateWorkspaceName($any($event.target).value)" (blur)="settings.saveWorkspaceNameNow()" (keydown.enter)="settings.saveWorkspaceNameNow(); $event.preventDefault()" required
            style="flex:1" />
        </div>
      </div>
      @if (settings.canManageApi()) {
      <div class="danger-zone">
        <div class="danger-zone-head">
          <span class="danger-label">Danger zone</span>
        </div>
        <div class="danger-action-row">
          <i class="ti ti-trash danger-action-icon"></i>
          <div class="danger-action-copy">
            <span class="danger-action-title">Delete this workspace</span>
            <span class="danger-action-desc">Permanently removes this workspace, its boards, cards, and settings.</span>
          </div>
          <button class="ghost sm danger-action-button" (click)="settings.deleteWorkspace()">Delete</button>
        </div>
      </div>
}
