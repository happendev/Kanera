<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Kanera Admin</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Set the theme before first paint so the console never flashes the wrong theme. Mirrors the tenant
       app's bootstrap; the 'kanera-admin-theme' key is admin-scoped so it does not clash with the app. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('kanera-admin-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <a-root></a-root>
</body>

</html>
