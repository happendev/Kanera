<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Kanera Admin</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kanera Admin" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />

  <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="60x60" href="/assets/favicon/apple-touch-icon-60x60.png" />
  <link rel="apple-touch-icon" sizes="76x76" href="/assets/favicon/apple-touch-icon-76x76.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="/assets/favicon/apple-touch-icon-120x120.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-touch-icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon-180x180.png" />

  <link rel="mask-icon" href="/assets/favicon/safari-pinned-tab.svg" color="#14b8a6" />
  <link rel="manifest" href="/assets/favicon/manifest.json" />

  <meta name="msapplication-config" content="/assets/favicon/browserconfig.xml" />
  <meta name="theme-color" content="#1a2536" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#eef2f7" media="(prefers-color-scheme: light)" />

  <!-- Set the theme before first paint so the console never flashes the wrong theme. Mirrors the tenant
       app's bootstrap; the 'kanera-admin-theme' key is admin-scoped so it does not clash with the app. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('kanera-admin-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <a-root></a-root>
</body>

</html>
