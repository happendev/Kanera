name: Feature request
description: Suggest an improvement for Kanera.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Kanera do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional context, workarounds, or tradeoffs.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, related issues, or workflow examples that would help explain the request.
