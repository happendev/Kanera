name: Bug report
description: Report a reproducible problem in Kanera.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Kanera. Do not report security vulnerabilities here; use SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest sequence that reproduces the issue.
      placeholder: |
        1. Start from...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Hosted
        - Self-hosted
        - Local development
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release, commit SHA, or branch if known.
      placeholder: v0.0.0, main@abc1234, or unknown
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node/pnpm versions, database, and any relevant deployment details.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
